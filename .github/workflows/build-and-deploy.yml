name: Build & Push Docker Image to Harbor (Core)

on:
  workflow_call:
    inputs:
      services:
        description: "Comma-separated service list. Empty이면 Dockerfile.* 자동 탐지"
        required: false
        type: string
        default: ""
      install_extras:
        description: "INSTALL_EXTRAS build arg"
        required: false
        type: string
        default: "ingestion"
      rag_use_real_adapters:
        description: "RAG_USE_REAL_ADAPTERS build arg"
        required: false
        type: string
        default: "false"
      service_name:
        description: "Single service name"
        required: false
        type: string
        default: ""
      dockerfile:
        description: "Dockerfile path for single service mode"
        required: false
        type: string
        default: ""
      context:
        description: "Build context for single service mode"
        required: false
        type: string
        default: "."
      build_target:
        description: "Docker build target"
        required: false
        type: string
        default: ""
      run_number:
        description: "run_number 대체값"
        required: false
        type: string
        default: ""
      build_platforms:
        description: "Buildx target platforms"
        required: false
        type: string
        default: "linux/amd64"
      manifest_event:
        description: "repository_dispatch event type"
        required: false
        type: string
        default: ""
    secrets:
      HARBOR_URL:
        required: true
      HARBOR_ID:
        required: true
      HARBOR_PASSWORD:
        required: true
      HARBOR_NAMESPACE:
        required: true
      MANIFEST_REPO_OWNER:
        required: false
      MANIFEST_REPO_NAME:
        required: false
      MANIFEST_REPO_TOKEN:
        required: false

permissions:
  contents: read
  actions: write

env:
  HARBOR_URL: ${{ secrets.HARBOR_URL }}
  HARBOR_ID: ${{ secrets.HARBOR_ID }}
  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
  HARBOR_NAMESPACE: ${{ secrets.HARBOR_NAMESPACE }}

  MANIFEST_REPO_OWNER: ${{ secrets.MANIFEST_REPO_OWNER }}
  MANIFEST_REPO_NAME: ${{ secrets.MANIFEST_REPO_NAME }}
  MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
  MANIFEST_REPO_EVENT: ${{ inputs.manifest_event != '' && inputs.manifest_event || secrets.MANIFEST_REPO_EVENT || 'harbor-image-updated' }}
  MANIFEST_REPO_BRANCH: main
  MANIFEST_VALUES_FILE: helm/applications/team7-app/values.yaml

  IMAGE_TAG_SHA: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & push images to Harbor
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve Harbor settings
        id: harbor
        run: |
          set -euo pipefail

          RAW_NAMESPACE="${HARBOR_NAMESPACE//$'\n'/}"
          RAW_NAMESPACE="${RAW_NAMESPACE#"${RAW_NAMESPACE%%[![:space:]]*}"}"
          RAW_NAMESPACE="${RAW_NAMESPACE%"${RAW_NAMESPACE##*[![:space:]]}"}"
          RAW_URL="${HARBOR_URL//$'\n'/}"
          RAW_URL="${RAW_URL#"${RAW_URL%%[![:space:]]*}"}"
          RAW_URL="${RAW_URL%"${RAW_URL##*[![:space:]]}"}"
          RAW_URL="${RAW_URL#https://}"
          RAW_URL="${RAW_URL#http://}"
          RAW_URL="${RAW_URL%%/*}"

          STRIPPED_NAMESPACE="${RAW_NAMESPACE#https://}"
          STRIPPED_NAMESPACE="${STRIPPED_NAMESPACE#http://}"

          RESOLVED_REGISTRY="${RAW_URL%/}"
          RESOLVED_NAMESPACE="${STRIPPED_NAMESPACE#/}"
          if echo "${STRIPPED_NAMESPACE}" | grep -q '/'; then
            RESOLVED_REGISTRY="${STRIPPED_NAMESPACE%%/*}"
            RESOLVED_NAMESPACE="${STRIPPED_NAMESPACE#*/}"
          elif [ -z "${RESOLVED_NAMESPACE}" ]; then
            RESOLVED_NAMESPACE="${GITHUB_REPOSITORY#*/}"
          fi

          if [ -z "${RESOLVED_REGISTRY}" ]; then
            echo "HARBOR registry 값을 계산할 수 없습니다. HARBOR_URL 또는 HARBOR_NAMESPACE를 확인하세요." >&2
            exit 1
          fi

          RESOLVED_NAMESPACE="${RESOLVED_NAMESPACE#/}"
          RESOLVED_NAMESPACE="${RESOLVED_NAMESPACE%/}"

          echo "registry=${RESOLVED_REGISTRY}" >> "${GITHUB_OUTPUT}"
          echo "namespace=${RESOLVED_NAMESPACE}" >> "${GITHUB_OUTPUT}"

      - name: Verify Harbor credentials
        env:
          RESOLVED_REGISTRY: ${{ steps.harbor.outputs.registry }}
        run: |
          set -euo pipefail
          : "${HARBOR_ID?HARBOR_ID secret is required}"
          : "${HARBOR_PASSWORD?HARBOR_PASSWORD secret is required}"
          : "${RESOLVED_REGISTRY?Could not resolve Harbor registry}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.harbor.outputs.registry }}
          username: ${{ env.HARBOR_ID }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Build and push image(s) to Harbor
        id: push-images
        env:
          INPUT_SERVICES: ${{ inputs.services }}
          INPUT_SERVICE_NAME: ${{ inputs.service_name }}
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_CONTEXT: ${{ inputs.context }}
          INPUT_INSTALL_EXTRAS: ${{ inputs.install_extras }}
          INPUT_RAG_USE_REAL_ADAPTERS: ${{ inputs.rag_use_real_adapters }}
          INPUT_TARGET: ${{ inputs.build_target }}
          INPUT_PLATFORM: ${{ inputs.build_platforms }}
          INPUT_RUN_NUMBER: ${{ inputs.run_number || github.run_number }}
        run: |
          set -euo pipefail

          SERVICES_CSV="${INPUT_SERVICES}"
          REPO_SERVICE_NAME="${GITHUB_REPOSITORY##*/}"
          if [ -z "${SERVICES_CSV}" ]; then
            if [ -n "${INPUT_SERVICE_NAME}" ] && [ -n "${INPUT_DOCKERFILE}" ]; then
              SERVICES_CSV="${INPUT_SERVICE_NAME}"
            else
              mapfile -t DETECTED_SERVICES < <(ls -1 Dockerfile.* 2>/dev/null | sed 's#^Dockerfile\.##' | sort -u)
              if [ "${#DETECTED_SERVICES[@]}" -eq 0 ]; then
                mapfile -t DETECTED_SERVICES < <(find . -maxdepth 2 -mindepth 2 -type f -name Dockerfile \
                  | sed 's#^\./##' \
                  | awk -F/ 'NF==2 {print $1}' \
                  | sort -u)
                if [ "${#DETECTED_SERVICES[@]}" -eq 0 ] && [ -f Dockerfile ]; then
                  DETECTED_SERVICES=("${REPO_SERVICE_NAME}")
                elif [ "${#DETECTED_SERVICES[@]}" -eq 0 ]; then
                  echo "Dockerfile을 찾지 못해 빌드 대상을 결정할 수 없습니다." >&2
                  exit 1
                fi
              fi
              SERVICES_CSV="$(IFS=','; echo "${DETECTED_SERVICES[*]}")"
            fi
          fi

          IMAGE_NAMESPACE="${{ steps.harbor.outputs.namespace }}"
          IMAGE_NAMESPACE="${IMAGE_NAMESPACE%/}"
          HARBOR_PREFIX="${{ steps.harbor.outputs.registry }}/${IMAGE_NAMESPACE}"
          SHORT_SHA="${IMAGE_TAG_SHA:0:7}"
          TAGS=("${IMAGE_TAG_SHA}" "${SHORT_SHA}" "${INPUT_RUN_NUMBER}")

          IFS=',' read -r -a SERVICES <<< "${SERVICES_CSV}"
          PUSHED_IMAGES=()
          SINGLE_MODE="false"
          if [ -n "${INPUT_SERVICE_NAME}" ] && [ -n "${INPUT_DOCKERFILE}" ] && [ "${#SERVICES[@]}" -eq 1 ]; then
            SINGLE_MODE="true"
          fi

          for SERVICE in "${SERVICES[@]}"; do
            SERVICE="$(echo "${SERVICE}" | tr -d '[:space:]')"
            [ -z "${SERVICE}" ] && continue

            DOCKERFILE="${INPUT_DOCKERFILE}"
            CONTEXT="${INPUT_CONTEXT}"
            if [ "${SINGLE_MODE}" = "false" ] || [ "${SERVICE}" = "default" ]; then
              if [ "${SERVICE}" = "default" ] || [ "${SERVICE}" = "${REPO_SERVICE_NAME}" ]; then
                DOCKERFILE="Dockerfile"
                CONTEXT="."
              elif [ -f "Dockerfile.${SERVICE}" ]; then
                DOCKERFILE="Dockerfile.${SERVICE}"
                CONTEXT="."
              elif [ -f "${SERVICE}/Dockerfile" ]; then
                DOCKERFILE="${SERVICE}/Dockerfile"
                CONTEXT="${SERVICE}"
              elif [ -f "services/${SERVICE}/Dockerfile" ]; then
                DOCKERFILE="services/${SERVICE}/Dockerfile"
                CONTEXT="services/${SERVICE}"
              else
                echo "Could not find Dockerfile for service=${SERVICE}" >&2
                exit 1
              fi
            fi

            IMAGE_NAME="${HARBOR_PREFIX}/${SERVICE}"
            TARGET="${INPUT_TARGET}"
            if [ -z "${TARGET}" ] && grep -Fq " AS ${SERVICE}" "${DOCKERFILE}"; then
              TARGET="${SERVICE}"
            fi

            CACHE_SCOPE="${SERVICE}"
            if [ -n "${TARGET}" ]; then
              CACHE_SCOPE="${SERVICE}-${TARGET}"
            fi

            TAG_ARGS=()
            for TAG in "${TAGS[@]}"; do
              TAG_ARGS+=("--tag" "${IMAGE_NAME}:${TAG}")
            done

            BUILD_ARGS=(
              docker buildx build
              --file "${DOCKERFILE}"
              --platform "${INPUT_PLATFORM}"
              --progress plain
              --push
              --build-arg "INSTALL_EXTRAS=${INPUT_INSTALL_EXTRAS}"
              --build-arg "RAG_USE_REAL_ADAPTERS=${INPUT_RAG_USE_REAL_ADAPTERS}"
              --cache-from "type=gha,scope=${CACHE_SCOPE}"
              --cache-to "type=gha,mode=max,scope=${CACHE_SCOPE}"
              "${TAG_ARGS[@]}"
            )
            if [ -n "${TARGET}" ]; then
              BUILD_ARGS+=(--target "${TARGET}")
            fi
            BUILD_ARGS+=("${CONTEXT}")

            "${BUILD_ARGS[@]}"

            PUSHED_IMAGES+=("${IMAGE_NAME}:${IMAGE_TAG_SHA}")
          done

          IMAGES_JSON_ARRAY="["
          for INDEX in "${!PUSHED_IMAGES[@]}"; do
            if [ "${INDEX}" -gt 0 ]; then
              IMAGES_JSON_ARRAY+=","
            fi
            IMAGES_JSON_ARRAY+="\"${PUSHED_IMAGES[${INDEX}]}\""
          done
          IMAGES_JSON_ARRAY+="]"

          IMAGES_JOINED="${PUSHED_IMAGES[*]}"
          echo "images=${IMAGES_JOINED}" >> "${GITHUB_OUTPUT}"
          echo "images_json=${IMAGES_JSON_ARRAY}" >> "${GITHUB_OUTPUT}"

      - name: Checkout manifest repository
        if: ${{ env.MANIFEST_REPO_OWNER != '' && env.MANIFEST_REPO_NAME != '' && env.MANIFEST_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO_OWNER }}/${{ env.MANIFEST_REPO_NAME }}
          token: ${{ env.MANIFEST_REPO_TOKEN }}
          path: manifest-repo
          ref: ${{ env.MANIFEST_REPO_BRANCH }}

      - name: Update manifest repository images
        if: ${{ env.MANIFEST_REPO_OWNER != '' && env.MANIFEST_REPO_NAME != '' && env.MANIFEST_REPO_TOKEN != '' }}
        run: |
          set -euo pipefail

          TARGET_FILE="manifest-repo/${MANIFEST_VALUES_FILE}"
          if [ -z "${MANIFEST_IMAGES}" ]; then
            echo "No image list to update."
            exit 0
          fi

          if [ ! -f "${TARGET_FILE}" ]; then
            echo "Manifest values file not found: ${TARGET_FILE}" >&2
            exit 1
          fi

          UPDATED=0
          for RAW_IMAGE in ${MANIFEST_IMAGES}; do
            IMAGE_NAME="${RAW_IMAGE%:*}"
            IMAGE_TAG="${RAW_IMAGE##*:}"
            IMAGE_REPO="${IMAGE_NAME##*/}"
            echo "Updating image repository=${IMAGE_REPO} to tag=${IMAGE_TAG}"

            if ! grep -qE "^[[:space:]]*repository:[[:space:]]*${IMAGE_REPO}[[:space:]]*$" "${TARGET_FILE}"; then
              echo "No matching repository entry for ${IMAGE_REPO} in ${TARGET_FILE}."
              continue
            fi

            sed -i "/^[[:space:]]*repository:[[:space:]]*${IMAGE_REPO}[[:space:]]*$/ {
                n
                s#^\\([[:space:]]*tag:[[:space:]]*\\).*#\\1${IMAGE_TAG}#
              }" "${TARGET_FILE}"
            UPDATED=1
          done

          if [ "${UPDATED}" -eq 0 ]; then
            echo "No manifest files were updated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_VALUES_FILE}"

          if git diff --cached --quiet; then
            echo "No manifest changes staged."
            exit 0
          fi

          git commit -m "Update image tags to ${IMAGE_TAG_SHA}"
          git push origin "${MANIFEST_REPO_BRANCH}"
        env:
          MANIFEST_IMAGES: ${{ steps.push-images.outputs.images }}

      - name: Skip manifest trigger when secrets are not configured
        if: ${{ !(env.MANIFEST_REPO_OWNER != '' && env.MANIFEST_REPO_NAME != '' && env.MANIFEST_REPO_TOKEN != '') }}
        run: |
          echo "Manifest repository trigger is skipped. Set MANIFEST_REPO_OWNER, MANIFEST_REPO_NAME, MANIFEST_REPO_TOKEN secrets to enable."
